      <span></span>

    </div>

  <!-- Cartoons Section -->
  <section class="cartoons" id="cartoons">
    <h2>Watch <span>Cartoons!</span></h2>
    <p class="cartoons-subtitle">Fun stories, music videos, and learning adventures!</p>

    <div class="category-tabs">
      <button class="category-tab active" onclick="filterEpisodes('all')">All</button>
      <button class="category-tab" onclick="filterEpisodes('funny')">Funny</button>
      <button class="category-tab" onclick="filterEpisodes('music')">Music</button>
      <button class="category-tab" onclick="filterEpisodes('educational')">Educational</button>
    </div>

    <div class="episode-grid">
      <!-- Episodes rendered by JS -->
    </div>
  </section>

  <!-- Cartoon Modal Player -->
  <div class="cartoon-modal">
    <div class="modal-content">
      <button class="modal-close">✕</button>
      <div class="cartoon-player">
        <div class="cartoon-stage"></div>
      </div>
      <div class="cartoon-progress">
        <div class="cartoon-progress-bar"></div>
      </div>
      <div class="cartoon-controls">
        <button class="control-btn play">▶</button>
        <button class="control-btn mute" onclick="toggleSound()">🔊</button>
        <span class="cartoon-time">0:00 / 0:00</span>
        <span class="cartoon-title-display"></span>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-character">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="100" cy="130" rx="55" ry="45" fill="#FFD740" stroke="#2D1B4E" stroke-width="3"/>

      </svg>
    </div>
    <div class="footer-character">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

      </svg>

      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="100" cy="130" rx="55" ry="45" fill="#FFD740" stroke="#2D1B4E" stroke-width="3"/>
        <circle cx="100" cy="70" r="35" fill="#FFD740" stroke="#2D1B4E" stroke-width="3"/>
        <circle cx="88" cy="62" r="6" fill="#2D1B4E"/>
        <circle cx="112" cy="62" r="6" fill="#2D1B4E"/>
        <ellipse cx="100" cy="82" rx="15" ry="10" fill="#FF9800" stroke="#2D1B4E" stroke-width="2"/>
